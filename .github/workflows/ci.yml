name: CI

# Windows-hosted because the app targets Windows: the shell tool shells out to
# PowerShell, hardware detection is Windows-specific, and pywebview pulls a
# native GUI stack. Running elsewhere would test a platform nobody ships.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# a new push to a PR supersedes the previous run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      # run_tests.ps1 falls back to `python` when there is no .venv, so the same
      # entry point developers use locally is the one CI runs. Smoke suites are
      # excluded: they need a live model backend.
      - name: Run tests (offline suites + lint + typecheck/build)
        shell: pwsh
        run: .\run_tests.ps1
